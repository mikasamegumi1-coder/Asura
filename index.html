<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASURA Content Score</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <header class="header">
    <h1>ASURA AI</h1>
    <p>Dashboard Analisis Konten</p>
  </header>
<nav class="top-menu">
  <button>🏠 Dashboard</button>
  <button>📊 Content Score</button>
  <button>📝 History</button>
  <button>⚙️ Settings</button>
</nav>
  <section class="score-cards">

    <div class="card">
      <h3>Overall Score</h3>
      <h2 id="overall-score">0%</h2>
    </div>

    <div class="card">
      <h3>Winning Chance</h3>
      <h2 id="winning-score">0%</h2>
    </div>

    <div class="card">
      <h3>Viral Score</h3>
      <h2 id="viral-score">0%</h2>
    </div>

    <div class="card">
      <h3>Content Quality</h3>
      <h2 id="quality-score">0%</h2>
    </div>

  </section>
<section class="analysis-panel">
  <h2>AI Analysis</h2>
<section class="analyzer">
  <h2>Analyze Your Content</h2>

  <textarea
    placeholder="Tempel script, caption, atau deskripsi produk di sini..."
    rows="8">
  </textarea>

  <button class="analyze-btn">
    🚀 Analyze Content
  </button>
</section>
  <div class="analysis-box">
    <p>🎯 Hook Score : 90%</p>
    <p>👀 Retention : 88%</p>
    <p>🎨 Visual : 94%</p>
    <p>💰 Selling Power : 86%</p>
    <p>📢 CTA : 91%</p>
    <p>🚀 Winning Prediction : HIGH</p>
  </div>
</section>
</div>
<script src="script.js"></script>
</body>
</html>
