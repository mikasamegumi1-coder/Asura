<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASURA Content Score</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

  <header class="header">
    <h1>ASURA AI</h1>
    <p>Dashboard Analisis Konten</p>
  </header>

  <section class="score-cards">

    <div class="card">
      <h3>Overall Score</h3>
      <h2>95%</h2>
    </div>

    <div class="card">
      <h3>Winning Chance</h3>
      <h2>92%</h2>
    </div>

    <div class="card">
      <h3>Viral Score</h3>
      <h2>89%</h2>
    </div>

    <div class="card">
      <h3>Content Quality</h3>
      <h2>94%</h2>
    </div>

  </section>

</div>

</body>
</html>
