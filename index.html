<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASURA Content Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <header class="header">
    <h1>ASURA</h1>
    <p>Content Analyzer</p>
  </header>

  <nav class="menu">
    <button>🏠 Dashboard</button>
    <button>📊 Analyzer</button>
    <button>📜 History</button>
    <button>⚙️ Settings</button>
  </nav>

  <section class="cards">

    <div class="card">
      <h3>Overall Score</h3>
      <h2 id="overall-score">0%</h2>
    </div>

    <div class="card">
      <h3>Winning Chance</h3>
      <h2 id="winning-score">0%</h2>
    </div>

    <div class="card">
      <h3>Viral Score</h3>
      <h2 id="viral-score">0%</h2>
    </div>

    <div class="card">
      <h3>Content Quality</h3>
      <h2 id="quality-score">0%</h2>
    </div>

  </section>

  <section class="analyzer">

    <h2>Paste Your Content</h2>

    <textarea
      class="content-input"
      placeholder="Tempel script, caption, atau deskripsi produk di sini..."
      rows="8"></textarea>

    <button class="analyze-btn">
      🚀 Analyze Content
    </button>

  </section>

  <section class="analysis-panel">

    <h2>AI Analysis Result</h2>

    <div class="analysis-box">

      <p>Belum ada analisis.</p>

    </div>

  </section>

</div>

<script src="script.js"></script>

</body>
</html>
